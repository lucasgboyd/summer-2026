<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#1a1a18" media="(prefers-color-scheme: dark)" />
<meta name="theme-color" content="#fafaf6" media="(prefers-color-scheme: light)" />
<title>Summer 2026 — Lucas & Carly</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%98%80%EF%B8%8F%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: #fafaf6;
    --surface: #ffffff;
    --surface-2: #f5f3ee;
    --text: #2c2c2c;
    --muted: #888888;
    --border: #e7e3da;
    --border-soft: #f0ece3;
    --accent: #d97757;
    --accent-hover: #c85a3a;
    --accent-soft: #f9efe7;
    --accent-bg: rgba(217, 119, 87, 0.06);
    --shadow-sm: 0 1px 2px rgba(44, 36, 28, 0.04);
    --shadow-md: 0 4px 16px rgba(44, 36, 28, 0.06);
    --shadow-lg: 0 12px 40px rgba(44, 36, 28, 0.10);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18;
      --surface: #242422;
      --surface-2: #2a2926;
      --text: #f0ebe3;
      --muted: #9b948a;
      --border: #34322e;
      --border-soft: #2a2924;
      --accent: #f0a878;
      --accent-hover: #ffbb8d;
      --accent-soft: #2e251d;
      --accent-bg: rgba(240, 168, 120, 0.10);
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.35);
      --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.45);
    }
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.65;
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }

  /* ========== HEADER ========== */
  header {
    background: color-mix(in srgb, var(--bg) 88%, transparent);
    border-bottom: 1px solid var(--border-soft);
    padding: 0.875rem 1.5rem;
    position: sticky;
    top: 0;
    z-index: 50;
    backdrop-filter: saturate(180%) blur(12px);
    -webkit-backdrop-filter: saturate(180%) blur(12px);
  }
  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    text-decoration: none;
    color: var(--text);
  }
  .brand-mark {
    font-size: 1.25rem;
    line-height: 1;
  }
  .brand-name {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 600;
    font-size: 1.15rem;
    letter-spacing: -0.01em;
  }
  .brand-sub {
    color: var(--muted);
    font-size: 0.82rem;
    font-weight: 400;
    margin-left: 0.5rem;
  }
  .edit-link {
    margin-left: auto;
    color: var(--muted);
    font-size: 0.8rem;
    text-decoration: none;
    padding: 0.4rem 0.75rem;
    border: 1px solid var(--border);
    border-radius: 999px;
    transition: all 0.2s ease;
    white-space: nowrap;
  }
  .edit-link:hover {
    color: var(--accent);
    border-color: var(--accent);
    background: var(--accent-bg);
  }
  nav {
    max-width: 1100px;
    margin: 0.5rem auto 0;
    display: flex;
    gap: 0.125rem;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding-bottom: 1px;
  }
  nav::-webkit-scrollbar { display: none; }
  nav button {
    background: transparent;
    border: none;
    color: var(--muted);
    font-size: 0.9rem;
    font-weight: 500;
    padding: 0.55rem 0.9rem;
    border-radius: 8px;
    cursor: pointer;
    white-space: nowrap;
    transition: color 0.15s ease, background 0.15s ease;
    font-family: inherit;
    position: relative;
  }
  nav button:hover {
    color: var(--text);
    background: var(--accent-bg);
  }
  nav button.active {
    color: var(--accent);
    font-weight: 600;
  }
  nav button.active::after {
    content: '';
    position: absolute;
    left: 0.9rem;
    right: 0.9rem;
    bottom: -1px;
    height: 2px;
    background: var(--accent);
    border-radius: 2px;
  }

  /* ========== HERO ========== */
  .hero {
    position: relative;
    max-width: 1100px;
    margin: 1.5rem auto 0;
    padding: 0 1.5rem;
  }
  .hero-card {
    position: relative;
    border-radius: 20px;
    overflow: hidden;
    min-height: 360px;
    background:
      linear-gradient(135deg, #d97757 0%, #e8a06a 45%, #f4d9c9 100%);
    box-shadow: var(--shadow-lg);
    display: flex;
    align-items: flex-end;
    padding: 2rem 1.75rem;
    isolation: isolate;
  }
  .hero-slides {
    position: absolute;
    inset: 0;
    z-index: -2;
  }
  .hero-slide {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    opacity: 0;
    transition: opacity 1.5s ease-in-out;
  }
  .hero-slide.active { opacity: 1; }
  .hero-card::after {
    content: '';
    position: absolute;
    inset: 0;
    z-index: -1;
    background: linear-gradient(
      180deg,
      rgba(0,0,0,0.15) 0%,
      rgba(0,0,0,0.20) 45%,
      rgba(0,0,0,0.65) 100%
    );
  }
  .hero-content {
    color: #ffffff;
    text-shadow: 0 2px 16px rgba(0, 0, 0, 0.5);
    width: 100%;
    position: relative;
  }
  .hero-eyebrow {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 0.78rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    opacity: 0.92;
    margin-bottom: 0.6rem;
  }
  .hero-title {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 600;
    font-size: clamp(2rem, 5.5vw, 3.5rem);
    line-height: 1.05;
    margin: 0 0 0.6rem;
    letter-spacing: -0.025em;
  }
  .hero-meta {
    font-size: 0.95rem;
    font-weight: 400;
    opacity: 0.95;
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem 1.25rem;
  }
  .hero-meta span { display: inline-flex; align-items: center; gap: 0.4rem; }

  /* ========== COUNTDOWN ========== */
  .countdown {
    max-width: 1100px;
    margin: 1.25rem auto 0;
    padding: 0 1.5rem;
  }
  .countdown-inner {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 0.85rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    box-shadow: var(--shadow-sm);
  }
  .countdown-number {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 600;
    font-size: 1.8rem;
    color: var(--accent);
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .countdown-label {
    color: var(--muted);
    font-size: 0.9rem;
    line-height: 1.35;
  }
  .countdown-label strong {
    color: var(--text);
    font-weight: 600;
    display: block;
  }

  /* ========== MAIN CONTENT ========== */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 2rem 1.5rem 5rem;
  }
  .content h1 {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 600;
    font-size: 2rem;
    line-height: 1.15;
    letter-spacing: -0.02em;
    margin: 0 0 1rem;
  }
  .content h2 {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 600;
    font-size: 1.4rem;
    line-height: 1.2;
    letter-spacing: -0.015em;
    margin: 2.25rem 0 0.75rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .content h2::after {
    content: '';
    position: absolute;
    left: 0;
    bottom: -1px;
    width: 36px;
    height: 2px;
    background: var(--accent);
    border-radius: 2px;
  }
  .content h3 {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 1.05rem;
    letter-spacing: -0.005em;
    margin: 1.25rem 0 0.5rem;
  }
  .content p { margin: 0.65rem 0; }
  .content em { color: var(--muted); font-style: italic; }
  .content strong { color: var(--text); font-weight: 600; }
  .content a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: color 0.15s ease, border-color 0.15s ease;
  }
  .content a:hover {
    color: var(--accent-hover);
    border-bottom-color: var(--accent);
  }
  .content ul, .content ol {
    padding-left: 1.35rem;
    margin: 0.65rem 0;
  }
  .content li { margin: 0.2rem 0; }
  .content li::marker { color: var(--accent); }
  .content hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 2rem 0;
  }
  .content code {
    background: var(--accent-soft);
    color: var(--accent-hover);
    padding: 0.15rem 0.4rem;
    border-radius: 5px;
    font-size: 0.875em;
    font-family: 'SF Mono', ui-monospace, Menlo, monospace;
  }
  @media (prefers-color-scheme: dark) {
    .content code { color: var(--accent); }
  }
  .content pre {
    background: var(--surface-2);
    padding: 0.85rem 1.1rem;
    border-radius: 10px;
    overflow-x: auto;
    border: 1px solid var(--border);
    font-size: 0.875rem;
    line-height: 1.55;
  }
  .content pre code {
    background: transparent;
    color: var(--text);
    padding: 0;
    font-size: inherit;
  }
  .content blockquote {
    border-left: 3px solid var(--accent);
    padding: 0.25rem 0 0.25rem 1rem;
    margin: 1rem 0;
    color: var(--muted);
    font-style: italic;
  }

  /* ========== TABLES ========== */
  .table-wrap {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    margin: 1rem 0;
    border-radius: 12px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
    background: var(--surface);
  }
  .content table {
    width: 100%;
    min-width: 620px;
    border-collapse: collapse;
    font-size: 0.88rem;
  }
  .content th, .content td {
    text-align: left;
    padding: 0.7rem 0.9rem;
    vertical-align: top;
    border-bottom: 1px solid var(--border-soft);
  }
  .content th {
    background: var(--accent);
    color: #fff;
    font-weight: 600;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    border-bottom: none;
    white-space: nowrap;
  }
  @media (prefers-color-scheme: dark) {
    .content th { color: #1a1a18; }
  }
  .content tbody tr {
    transition: background 0.15s ease;
  }
  .content tbody tr:nth-child(even) { background: var(--accent-bg); }
  .content tbody tr:hover { background: var(--accent-soft); }
  .content tbody tr:last-child td { border-bottom: none; }
  .content tbody tr.today {
    background: var(--accent-soft) !important;
    box-shadow: inset 4px 0 0 var(--accent);
  }
  .content tbody tr.today td:first-child {
    font-weight: 700;
    color: var(--accent-hover);
  }
  @media (prefers-color-scheme: dark) {
    .content tbody tr.today td:first-child { color: var(--accent); }
  }

  /* ========== GALLERY ========== */
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 0.85rem;
    margin: 1.25rem 0;
  }
  .gallery-item {
    aspect-ratio: 4 / 3;
    background: var(--surface-2);
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
    display: block;
    position: relative;
  }
  .gallery-item:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
  }
  .gallery-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .gallery-empty {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--muted);
    background: var(--surface);
    border: 1px dashed var(--border);
    border-radius: 12px;
    font-size: 0.95rem;
  }
  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 2rem;
    cursor: zoom-out;
  }
  .lightbox.open { display: flex; }
  .lightbox img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    border-radius: 6px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  /* ========== STATES ========== */
  .loading, .error {
    color: var(--muted);
    text-align: center;
    padding: 3rem 1rem;
    font-style: italic;
  }
  .error { color: var(--accent-hover); }

  /* ========== SCROLL TO TOP ========== */
  .scroll-top {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    border: none;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    box-shadow: var(--shadow-md);
    transition: transform 0.2s ease, background 0.2s ease;
    font-size: 1.1rem;
    z-index: 40;
  }
  .scroll-top:hover {
    transform: translateY(-2px);
    background: var(--accent-hover);
  }
  .scroll-top.visible { display: flex; }
  @media (prefers-color-scheme: dark) {
    .scroll-top { color: #1a1a18; }
  }

  /* ========== RESPONSIVE ========== */
  @media (max-width: 720px) {
    header { padding: 0.75rem 1rem; }
    .brand-sub { display: none; }
    .brand-name { font-size: 1.05rem; }
    .edit-link { font-size: 0.75rem; padding: 0.35rem 0.65rem; }
    nav button { font-size: 0.85rem; padding: 0.5rem 0.75rem; }
    .hero { padding: 0 1rem; margin-top: 1rem; }
    .hero-card { min-height: 220px; padding: 1.5rem 1.25rem; border-radius: 16px; }
    .hero-title { font-size: clamp(1.75rem, 8vw, 2.5rem); }
    .hero-meta { font-size: 0.85rem; gap: 0.4rem 1rem; }
    .countdown { padding: 0 1rem; margin-top: 1rem; }
    .countdown-inner { padding: 0.75rem 1rem; }
    .countdown-number { font-size: 1.5rem; }
    .countdown-label { font-size: 0.85rem; }
    main { padding: 1.5rem 1rem 4rem; }
    .content h1 { font-size: 1.65rem; }
    .content h2 { font-size: 1.2rem; }
    .gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 0.6rem; }
    .scroll-top { bottom: 1rem; right: 1rem; width: 40px; height: 40px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="brand" href="#home">
      <span class="brand-mark">☀️</span>
      <span class="brand-name">Summer 2026</span>
      <span class="brand-sub">Lucas &amp; Carly</span>
    </a>
    <a class="edit-link" href="https://github.com/lucasgboyd/summer-2026" target="_blank" rel="noopener">Edit on GitHub ↗</a>
  </div>
  <nav id="nav"></nav>
</header>

<div id="home-extras" style="display:none;">
  <div class="hero">
    <div class="hero-card" id="hero-card">
      <div class="hero-slides" id="hero-slides"></div>
      <div class="hero-content">
        <div class="hero-eyebrow">A Summer Together</div>
        <h1 class="hero-title">Coast to Mountains<br />to Coast Again</h1>
        <div class="hero-meta">
          <span>📅 Jul 1 — Sep 14, 2026</span>
          <span>🚗 Santa Barbara → Maine</span>
          <span>👫 Lucas &amp; Carly</span>
        </div>
      </div>
    </div>
  </div>
  <div class="countdown">
    <div class="countdown-inner">
      <div class="countdown-number" id="countdown-number">—</div>
      <div class="countdown-label" id="countdown-label">
        <strong>Loading…</strong>
        until the trip begins
      </div>
    </div>
  </div>
</div>

<main>
  <div id="content" class="content"><div class="loading">Loading…</div></div>
</main>

<button class="scroll-top" id="scroll-top" aria-label="Scroll to top">↑</button>

<div class="lightbox" id="lightbox">
  <img id="lightbox-img" alt="" />
</div>

<script>
  const TRIP_START = new Date("2026-07-01T00:00:00");
  const TRIP_END = new Date("2026-09-14T23:59:59");

  // Rotating hero images — files in pics/website/. Add/remove freely.
  const HERO_IMAGES = [
    "pics/website/IMG_9715.JPG",
    "pics/website/IMG_3589_Original.jpg",
    "pics/website/FullSizeRender.JPG",
    "pics/website/IMG_5799.JPG"
  ];
  const HERO_INTERVAL_MS = 7000;

  const PAGES = [
    { id: "home",        file: "README.md",      label: "Home" },
    { id: "schedule",    file: "schedule.md",    label: "Schedule" },
    { id: "lodging",     file: "lodging.md",     label: "Lodging" },
    { id: "flights",     file: "flights.md",     label: "Flights" },
    { id: "packing",     file: "packing.md",     label: "Packing" },
    { id: "restaurants", file: "restaurants.md", label: "Restaurants" },
    { id: "activities",  file: "activities.md",  label: "Activities" },
  ];

  const nav = document.getElementById("nav");
  const content = document.getElementById("content");
  const homeExtras = document.getElementById("home-extras");
  const scrollTop = document.getElementById("scroll-top");
  const heroSlides = document.getElementById("hero-slides");
  const lightbox = document.getElementById("lightbox");
  const lightboxImg = document.getElementById("lightbox-img");

  // Build nav
  PAGES.forEach(p => {
    const btn = document.createElement("button");
    btn.textContent = p.label;
    btn.dataset.id = p.id;
    btn.addEventListener("click", () => loadPage(p.id, true));
    nav.appendChild(btn);
  });

  // Hero rotating slideshow
  let heroSlideIndex = 0;
  let heroTimer = null;
  function setupHero() {
    if (!HERO_IMAGES.length) return;
    HERO_IMAGES.forEach((src, i) => {
      const slide = document.createElement("div");
      slide.className = "hero-slide" + (i === 0 ? " active" : "");
      slide.style.backgroundImage = "url('" + src + "')";
      heroSlides.appendChild(slide);
      // Preload
      const img = new Image();
      img.src = src;
    });
    if (HERO_IMAGES.length > 1) {
      heroTimer = setInterval(rotateHero, HERO_INTERVAL_MS);
    }
  }
  function rotateHero() {
    const slides = heroSlides.querySelectorAll(".hero-slide");
    if (slides.length < 2) return;
    slides[heroSlideIndex].classList.remove("active");
    heroSlideIndex = (heroSlideIndex + 1) % slides.length;
    slides[heroSlideIndex].classList.add("active");
  }
  setupHero();

  // Countdown
  function updateCountdown() {
    const now = new Date();
    const numEl = document.getElementById("countdown-number");
    const labEl = document.getElementById("countdown-label");
    if (!numEl || !labEl) return;
    if (now < TRIP_START) {
      const days = Math.ceil((TRIP_START - now) / (1000 * 60 * 60 * 24));
      numEl.textContent = days;
      labEl.innerHTML = "<strong>day" + (days === 1 ? "" : "s") + " until the trip begins</strong>July 1, 2026";
    } else if (now <= TRIP_END) {
      const dayOf = Math.floor((now - TRIP_START) / (1000 * 60 * 60 * 24)) + 1;
      const total = Math.ceil((TRIP_END - TRIP_START) / (1000 * 60 * 60 * 24));
      numEl.textContent = "Day " + dayOf;
      labEl.innerHTML = "<strong>of " + total + " on the road</strong>The trip is happening";
    } else {
      numEl.textContent = "✓";
      labEl.innerHTML = "<strong>Trip complete</strong>Hope it was a good one";
    }
  }

  function highlightToday() {
    const today = new Date();
    today.setHours(0,0,0,0);
    const fmt = today.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
    // "Wed Jul 1" style: strip leading zeros on day
    const target = fmt.replace(/,/g, "").replace(/\s0/g, " ");
    document.querySelectorAll(".content tbody tr").forEach(row => {
      const firstCell = row.querySelector("td:first-child");
      if (firstCell && firstCell.textContent.trim() === target) {
        row.classList.add("today");
        setTimeout(() => row.scrollIntoView({ behavior: "smooth", block: "center" }), 100);
      }
    });
  }

  async function loadPage(id, updateHash = false) {
    const page = PAGES.find(p => p.id === id) || PAGES[0];
    document.querySelectorAll("nav button").forEach(b => {
      b.classList.toggle("active", b.dataset.id === page.id);
    });
    homeExtras.style.display = page.id === "home" ? "block" : "none";
    content.innerHTML = '<div class="loading">Loading…</div>';
    if (updateHash) history.replaceState(null, "", "#" + page.id);
    window.scrollTo({ top: 0, behavior: "smooth" });

    try {
      const res = await fetch(page.file + "?t=" + Date.now(), { cache: "no-store" });
      if (!res.ok) throw new Error("Could not load " + page.file);
      const md = await res.text();
      const html = marked.parse(md, { gfm: true, breaks: false });
      content.innerHTML = html;

      // Strip the README's top H1 since we have the hero
      if (page.id === "home") {
        const firstH1 = content.querySelector("h1");
        if (firstH1) firstH1.remove();
      }

      // Wrap tables
      content.querySelectorAll("table").forEach(t => {
        const wrap = document.createElement("div");
        wrap.className = "table-wrap";
        t.parentNode.insertBefore(wrap, t);
        wrap.appendChild(t);
      });
      // External links new tab
      content.querySelectorAll('a[href^="http"]').forEach(a => {
        a.target = "_blank";
        a.rel = "noopener";
      });
      // Intercept internal .md links
      content.querySelectorAll('a[href$=".md"]').forEach(a => {
        a.addEventListener("click", e => {
          e.preventDefault();
          const file = a.getAttribute("href").replace(/^\.\//, "");
          const match = PAGES.find(p => p.file === file);
          if (match) loadPage(match.id, true);
        });
      });

      if (page.id === "schedule") highlightToday();
      if (page.id === "home") updateCountdown();
    } catch (err) {
      content.innerHTML = '<div class="error">Failed to load: ' + err.message + '</div>';
    }
  }

  function renderGallery() {
    if (!GALLERY.length) {
      content.innerHTML = `
        <h1>Gallery</h1>
        <p>Photos from the road will live here.</p>
        <div class="gallery-empty">
          📷  No photos yet.<br /><br />
          <span style="font-size:0.85rem;">Add image filenames to the <code>GALLERY</code> array in <code>index.html</code> and push to GitHub.</span>
        </div>`;
      return;
    }
    let html = '<h1>Gallery</h1><div class="gallery-grid">';
    GALLERY.forEach(src => {
      html += `<a class="gallery-item" data-src="${src}"><img loading="lazy" src="${src}" alt="" /></a>`;
    });
    html += '</div>';
    content.innerHTML = html;
    content.querySelectorAll(".gallery-item").forEach(item => {
      item.addEventListener("click", e => {
        e.preventDefault();
        lightboxImg.src = item.dataset.src;
        lightbox.classList.add("open");
      });
    });
  }

  lightbox.addEventListener("click", () => {
    lightbox.classList.remove("open");
    lightboxImg.src = "";
  });

  // Scroll to top button
  scrollTop.addEventListener("click", () => window.scrollTo({ top: 0, behavior: "smooth" }));
  window.addEventListener("scroll", () => {
    scrollTop.classList.toggle("visible", window.scrollY > 400);
  });

  // Init
  const initial = window.location.hash.replace("#", "") || "home";
  loadPage(initial, false);
  setInterval(updateCountdown, 60000);

  // Listen for hash changes (so direct # links work)
  window.addEventListener("hashchange", () => {
    const id = window.location.hash.replace("#", "") || "home";
    loadPage(id, false);
  });
</script>

</body>
</html>
