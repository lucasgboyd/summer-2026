<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#1a1a1a" />
<title>Summer 2026 — Lucas & Carly</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%98%80%EF%B8%8F%3C/text%3E%3C/svg%3E" />
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: #fbfaf7;
    --surface: #ffffff;
    --text: #1a1a1a;
    --muted: #6b6b6b;
    --border: #e5e0d8;
    --accent: #c2410c;
    --accent-soft: #fff1e8;
    --row-alt: #f7f4ef;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14110d;
      --surface: #1c1814;
      --text: #f0ebe3;
      --muted: #9a9389;
      --border: #2e2820;
      --accent: #f97316;
      --accent-soft: #2a1f15;
      --row-alt: #1f1a14;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1rem 1.25rem;
    position: sticky;
    top: 0;
    z-index: 10;
    backdrop-filter: saturate(180%) blur(8px);
  }
  .title-row {
    display: flex;
    align-items: baseline;
    gap: 0.75rem;
    flex-wrap: wrap;
    max-width: 960px;
    margin: 0 auto;
  }
  h1 {
    font-size: 1.25rem;
    margin: 0;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .subtitle {
    color: var(--muted);
    font-size: 0.875rem;
  }
  nav {
    max-width: 960px;
    margin: 0.75rem auto 0;
    display: flex;
    gap: 0.25rem;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  nav::-webkit-scrollbar { display: none; }
  nav button {
    background: transparent;
    border: none;
    color: var(--muted);
    font-size: 0.95rem;
    font-weight: 500;
    padding: 0.5rem 0.875rem;
    border-radius: 8px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    font-family: inherit;
  }
  nav button:hover {
    color: var(--text);
    background: var(--accent-soft);
  }
  nav button.active {
    color: var(--accent);
    background: var(--accent-soft);
    font-weight: 600;
  }
  main {
    max-width: 960px;
    margin: 0 auto;
    padding: 1.5rem 1.25rem 4rem;
  }
  .content h1, .content h2, .content h3 {
    line-height: 1.25;
    letter-spacing: -0.01em;
  }
  .content h1 {
    font-size: 1.75rem;
    margin: 0 0 1rem;
    font-weight: 700;
  }
  .content h2 {
    font-size: 1.25rem;
    margin: 2rem 0 0.75rem;
    padding-bottom: 0.4rem;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
  }
  .content h3 {
    font-size: 1.05rem;
    margin: 1.25rem 0 0.5rem;
    font-weight: 600;
  }
  .content p { margin: 0.6rem 0; }
  .content em { color: var(--muted); }
  .content strong { color: var(--text); }
  .content a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid transparent;
  }
  .content a:hover { border-bottom-color: var(--accent); }
  .content ul, .content ol {
    padding-left: 1.5rem;
    margin: 0.6rem 0;
  }
  .content li { margin: 0.25rem 0; }
  .content hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 1.5rem 0;
  }
  .content code {
    background: var(--accent-soft);
    color: var(--accent);
    padding: 0.125rem 0.375rem;
    border-radius: 4px;
    font-size: 0.9em;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
  }
  .content pre {
    background: var(--row-alt);
    padding: 0.75rem 1rem;
    border-radius: 8px;
    overflow-x: auto;
    border: 1px solid var(--border);
  }
  .content pre code {
    background: transparent;
    color: var(--text);
    padding: 0;
  }
  .content blockquote {
    border-left: 3px solid var(--accent);
    padding-left: 1rem;
    margin: 0.75rem 0;
    color: var(--muted);
  }
  .table-wrap {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    margin: 0.75rem -0.5rem;
    padding: 0 0.5rem;
    border-radius: 8px;
  }
  .content table {
    width: 100%;
    min-width: 600px;
    border-collapse: collapse;
    font-size: 0.9rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .content th, .content td {
    text-align: left;
    padding: 0.625rem 0.75rem;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  .content th {
    background: var(--accent-soft);
    color: var(--accent);
    font-weight: 600;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    position: sticky;
    top: 0;
  }
  .content tbody tr:nth-child(even) { background: var(--row-alt); }
  .content tbody tr:last-child td { border-bottom: none; }
  .loading, .error {
    color: var(--muted);
    text-align: center;
    padding: 2rem;
    font-style: italic;
  }
  .error { color: #c2410c; }
  .last-updated {
    color: var(--muted);
    font-size: 0.8rem;
    text-align: right;
    margin-top: 2rem;
    padding-top: 1rem;
    border-top: 1px dashed var(--border);
  }
  .edit-link {
    display: inline-flex;
    align-items: center;
    gap: 0.25rem;
    color: var(--muted);
    font-size: 0.85rem;
    text-decoration: none;
    padding: 0.4rem 0.7rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    transition: all 0.15s;
    margin-left: auto;
  }
  .edit-link:hover {
    color: var(--accent);
    border-color: var(--accent);
  }
  @media (max-width: 600px) {
    header { padding: 0.875rem 1rem; }
    h1 { font-size: 1.1rem; }
    .subtitle { display: none; }
    main { padding: 1rem 1rem 3rem; }
    .content h1 { font-size: 1.4rem; }
    .content h2 { font-size: 1.1rem; }
    nav button { font-size: 0.9rem; padding: 0.45rem 0.75rem; }
  }
</style>
</head>
<body>
<header>
  <div class="title-row">
    <h1>☀️ Summer 2026</h1>
    <span class="subtitle">Lucas & Carly · Jul 1 – Sep 14</span>
    <a class="edit-link" href="https://github.com/lucasgboyd/summer-2026" target="_blank" rel="noopener">Edit on GitHub →</a>
  </div>
  <nav id="nav"></nav>
</header>
<main>
  <div id="content" class="content"><div class="loading">Loading…</div></div>
</main>

<script>
  const PAGES = [
    { id: "home",        file: "README.md",      label: "Home" },
    { id: "schedule",    file: "schedule.md",    label: "Schedule" },
    { id: "lodging",     file: "lodging.md",     label: "Lodging" },
    { id: "flights",     file: "flights.md",     label: "Flights" },
    { id: "packing",     file: "packing.md",     label: "Packing" },
    { id: "restaurants", file: "restaurants.md", label: "Restaurants" },
    { id: "activities",  file: "activities.md",  label: "Activities" },
  ];

  const nav = document.getElementById("nav");
  const content = document.getElementById("content");

  PAGES.forEach(p => {
    const btn = document.createElement("button");
    btn.textContent = p.label;
    btn.dataset.id = p.id;
    btn.addEventListener("click", () => loadPage(p.id, true));
    nav.appendChild(btn);
  });

  async function loadPage(id, updateHash = false) {
    const page = PAGES.find(p => p.id === id) || PAGES[0];
    document.querySelectorAll("nav button").forEach(b => {
      b.classList.toggle("active", b.dataset.id === page.id);
    });
    content.innerHTML = '<div class="loading">Loading…</div>';
    if (updateHash) history.replaceState(null, "", "#" + page.id);
    try {
      const res = await fetch(page.file + "?t=" + Date.now(), { cache: "no-store" });
      if (!res.ok) throw new Error("Could not load " + page.file);
      const md = await res.text();
      const html = marked.parse(md, { gfm: true, breaks: false });
      content.innerHTML = html;
      // wrap tables for horizontal scroll
      content.querySelectorAll("table").forEach(t => {
        const wrap = document.createElement("div");
        wrap.className = "table-wrap";
        t.parentNode.insertBefore(wrap, t);
        wrap.appendChild(t);
      });
      // make external links open in new tab
      content.querySelectorAll('a[href^="http"]').forEach(a => {
        a.target = "_blank";
        a.rel = "noopener";
      });
      // intercept internal .md links
      content.querySelectorAll('a[href$=".md"]').forEach(a => {
        a.addEventListener("click", e => {
          e.preventDefault();
          const file = a.getAttribute("href").replace(/^\.\//, "");
          const match = PAGES.find(p => p.file === file);
          if (match) loadPage(match.id, true);
        });
      });
      window.scrollTo(0, 0);
    } catch (err) {
      content.innerHTML = '<div class="error">Failed to load: ' + err.message + '</div>';
    }
  }

  const initial = window.location.hash.replace("#", "") || "home";
  loadPage(initial, false);
</script>
</body>
</html>
